<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex items-center justify-center h-screen bg-gray-100">

<div class="bg-white p-8 rounded shadow w-80">
  <h1 class="text-2xl font-bold mb-4 text-center">Login</h1>

  <input id="email" type="email" placeholder="Email" class="w-full p-2 mb-3 border rounded">
  <input id="senha" type="password" placeholder="Senha" class="w-full p-2 mb-4 border rounded">

  <button onclick="login()" class="w-full bg-black text-white py-2 rounded">
    Entrar
  </button>

  <p id="msg" class="text-red-500 mt-2 text-center"></p>
</div>

<script>
async function login() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const res = await fetch("http://localhost:3001/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, senha })
  });

  const data = await res.json();

  if (data.autorizado) {
    localStorage.setItem("token", data.token);
    window.location.href = "painel.html";
  } else {
    document.getElementById("msg").innerText = "Login inválido";
  }
}
</script>

</body>
</html>
